# Alembic configuration for CardDemo FastAPI application.
# Run: alembic upgrade head
# Generate: alembic revision --autogenerate -m "description"

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone used for timestamps
timezone = UTC

# Database URL is read from environment variable DATABASE_URL via env.py
# Do NOT hardcode credentials here.
sqlalchemy.url = postgresql+asyncpg://carddemo:carddemo@localhost:5432/carddemo

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
