sonar.projectKey=TrieDatum-Inc_mainframe-conversion-claude
sonar.organization=triedatum-inc

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=mainframe-conversion-claude
sonar.projectVersion=1.0

# Source roots
sonar.sources=backend/app,front_end/src

# Test source roots
sonar.tests=backend/tests,front_end/src/__tests__

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Python coverage — generated by:
#   cd backend && poetry run pytest tests/ --cov=app --cov-report=xml:coverage.xml
# ---------------------------------------------------------------------------
sonar.python.coverage.reportPaths=backend/coverage.xml

# ---------------------------------------------------------------------------
# Exclusions — do not scan generated, vendored, or migration files
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/alembic/**,\
  **/sql/**,\
  front_end/src/__tests__/**,\
  backend/tests/**

sonar.coverage.exclusions=\
  **/alembic/**,\
  **/sql/**,\
  backend/tests/**,\
  front_end/src/__tests__/**,\
  front_end/src/app/layout.tsx

# JavaScript/TypeScript — coverage from Jest (lcov format)
# Generated by: cd front_end && npm test -- --coverage --coverageReporters=lcov
sonar.javascript.lcov.reportPaths=front_end/coverage/lcov.info
