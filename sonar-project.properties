sonar.projectKey=TrieDatum-Inc_mainframe-conversion-claude
sonar.organization=triedatum-inc


# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=mainframe-conversion-claude
sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Python coverage report — generated by CI step before Sonar scan
# Path is relative to sonar-project.properties (repo root)
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclude seed SQL from PLSQL S1192 (duplicate-literal rule).
# seed_data.sql is PostgreSQL DML seed data — PLSQL constant-extraction is
# not applicable to plain SQL INSERT statements.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=backend/sql/seed_data.sql