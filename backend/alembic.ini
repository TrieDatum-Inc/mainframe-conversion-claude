# Alembic configuration file
# CardDemo database migration management
# Replaces VSAM file IDCAMS control card sequences (DEFINE CLUSTER, ALTER, etc.)

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Database URL — overridden by env.py which reads from app.config.settings
# Do NOT put credentials here; use environment variables
sqlalchemy.url = postgresql://carddemo:carddemo@localhost:5432/carddemo

[post_write_hooks]
# Run Black formatter on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
