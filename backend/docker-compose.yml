version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: carddemo_postgres
    environment:
      POSTGRES_USER: carddemo
      POSTGRES_PASSWORD: carddemo
      POSTGRES_DB: carddemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carddemo -d carddemo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carddemo_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://carddemo:carddemo@postgres:5432/carddemo
      DATABASE_URL_SYNC: postgresql://carddemo:carddemo@postgres:5432/carddemo
      JWT_SECRET_KEY: dev-secret-key-replace-in-production-with-256-bit-random-value
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: '["http://localhost:3000"]'
      BCRYPT_ROUNDS: 12
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # Hot reload in development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    name: carddemo_postgres_data
