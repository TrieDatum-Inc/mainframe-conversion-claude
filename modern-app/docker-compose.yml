version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — replaces VSAM USRSEC KSDS and future DB2/VSAM files
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: carddemo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carddemo
      POSTGRES_PASSWORD: carddemo
      POSTGRES_DB: carddemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carddemo -d carddemo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI backend — modernized COBOL online programs (COSGN00C, etc.)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carddemo_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://carddemo:carddemo@db:5432/carddemo
      SECRET_KEY: change-me-in-production-use-a-long-random-string-at-least-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        python seed_data.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─────────────────────────────────────────────────────────────────────────────
  # Next.js frontend — replaces BMS screens (COSGN00, COMEN01, COADM01)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carddemo_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
